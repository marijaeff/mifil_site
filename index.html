<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiFiL</title>
  <meta name="description" content="A place to feel. Not to win. To be." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-glow"></div>
  <div class="house-silhouette" aria-hidden="true"></div>

  <header class="site-header">
    <a class="logo" href="#" aria-label="MiFiL home">
      <img src="logo.png" alt="MiFiL logo">
    </a>
  </header>

  <main class="hero">
    <div class="top-window" aria-hidden="true"></div>

    <section class="hero-copy">
      <h1 id="hero-title"></h1>
      <p class="hero-subtitle" id="hero-subtitle">Not to win. To be.</p>
      <a class="enter-button" href="#projects" id="enter-link">Enter the house</a>
    </section>

    <section class="projects" id="projects" aria-label="Projects">
      <a class="project-card" id="project-1" href="#" target="_blank" rel="noopener noreferrer">
        <span class="card-top-light" aria-hidden="true"></span>
        <h2 class="project-title"></h2>
        <p class="project-description"></p>
      </a>

      <div class="project-card" id="project-2" aria-disabled="true">
        <span class="card-top-light" aria-hidden="true"></span>
        <h2 class="project-title"></h2>
        <p class="project-description"></p>
      </div>

      <div class="project-card" id="project-3" aria-disabled="true">
        <span class="card-top-light" aria-hidden="true"></span>
        <h2 class="project-title"></h2>
        <p class="project-description"></p>
      </div>
    </section>
  </main>

  <script src="texts.js"></script>
  <script src="script.js"></script>
</body>
</html>
